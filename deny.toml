[graph]
targets = []

[advisories]
version = 2
ignore = [
  # `paste` announced as unmaintained; no replacement available yet.
  # Bevy pulls it in transitively — nothing actionable on our end.
  "RUSTSEC-2024-0436",
  # unmaintained: postcard -> heapless -> atomic-polyfill
  "RUSTSEC-2023-0089",
]

[licenses]
version = 2
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

exceptions = [
  # unicode-ident bundles Unicode data under Unicode-DFS-2016 alongside MIT/Apache-2.0
  { name = "unicode-ident", allow = ["Unicode-DFS-2016"] },
  # Bevy's audio backend; MPL-2.0 is file-level copyleft, compatible with AGPL-3.0
  { name = "symphonia", allow = ["MPL-2.0"] },
  { name = "symphonia-bundle-flac", allow = ["MPL-2.0"] },
  { name = "symphonia-bundle-mp3", allow = ["MPL-2.0"] },
  { name = "symphonia-codec-aac", allow = ["MPL-2.0"] },
  { name = "symphonia-codec-pcm", allow = ["MPL-2.0"] },
  { name = "symphonia-codec-vorbis", allow = ["MPL-2.0"] },
  { name = "symphonia-core", allow = ["MPL-2.0"] },
  { name = "symphonia-format-isomp4", allow = ["MPL-2.0"] },
  { name = "symphonia-format-ogg", allow = ["MPL-2.0"] },
  { name = "symphonia-format-riff", allow = ["MPL-2.0"] },
  { name = "symphonia-metadata", allow = ["MPL-2.0"] },
  { name = "symphonia-utils-xiph", allow = ["MPL-2.0"] },
]

[licenses.private]
# Our workspace crates are not published to crates.io, so skip licence checks on them
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [
  # These are runtime-critical Bevy crates where split versions cause subtle bugs or
  # silent ABI mismatches. Keep exactly one version in the tree at all times.
  { name = "ahash", deny-multiple-versions = true },
  { name = "glam", deny-multiple-versions = true },
  { name = "raw-window-handle", deny-multiple-versions = true },
]
skip = []

# thiserror is the idiomatic error-derivation crate; block derive_more's error feature
# to avoid accidentally pulling in a second error-derive implementation
[[bans.features]]
crate = "derive_more"
deny = ["error"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
